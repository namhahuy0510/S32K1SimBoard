<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>S32K1 Simulator - Final Fix</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        
        /* Neumorphic */
        .neumorphic-flat {
            background: #f0f2f5;
            box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
        }

        /* Canvas */
        #canvas {
            width: 100%; height: 85vh;
            position: relative;
            background: #f0f2f5;
            border-radius: 20px;
            margin: 20px;
            overflow: hidden;
        }

        /* SVG Layer */
        #svg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* Rất quan trọng */
            z-index: 5;
        }

        /* Linh kiện */
        .device {
            width: 100px; height: 100px;
            position: absolute;
            z-index: 10;
            cursor: move;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 15px;
        }

        /* Nốt tròn nối dây */
        .dot {
            width: 14px; height: 14px;
            background: #005bc2;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            z-index: 100; /* Luôn nằm trên cùng của linh kiện */
            cursor: crosshair;
            margin-top: -7px;
        }

        path {
            fill: none;
            stroke: #005bc2;
            stroke-width: 3;
            pointer-events: stroke;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="mt-4 font-bold text-gray-600">DRAG DOT TO CONNECT WIRE</div>

    <div id="canvas" class="neumorphic-flat">
        <svg id="svg-layer"></svg>

        <div class="device neumorphic-flat" style="top: 100px; left: 100px;">
            <span class="text-[10px] font-bold">HC-SR04</span>
            <div class="dot" style="right: -7px; top: 50%;"></div>
        </div>

        <div class="device neumorphic-flat" style="top: 100px; left: 400px;">
            <span class="text-[10px] font-bold">LCD 16x2</span>
            <div class="dot" style="left: -7px; top: 50%;"></div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            let isWiring = false;
            let startNode = null;
            let $tempLine = null;

            // Xử lý kéo linh kiện
            $(".device").draggable({
                containment: "parent",
                cancel: ".dot", // Ép không kéo linh kiện khi nhấn vào nốt
                drag: function() { updateAllLines(); }
            });

            // Khi nhấn vào chấm xanh
            $(document).on("mousedown", ".dot", function(e) {
                e.stopPropagation();
                isWiring = true;
                startNode = $(this);
                
                // Tạo thẻ path theo Namespace SVG
                $tempLine = $(document.createElementNS("http://www.w3.org/2000/svg", "path"));
                $("#svg-layer").append($tempLine);
            });

            // Khi di chuyển chuột
            $(document).on("mousemove", function(e) {
                if (!isWiring) return;
                const canvasOff = $("#canvas").offset();
                const p1 = getCenter(startNode);
                const x2 = e.pageX - canvasOff.left;
                const y2 = e.pageY - canvasOff.top;
                
                // Vẽ đường thẳng đơn giản như bản test
                $tempLine.attr("d", `M ${p1.x} ${p1.y} L ${x2} ${y2}`);
            });

            // Khi thả chuột
            $(document).on("mouseup", function(e) {
                if (!isWiring) return;
                const $target = $(e.target);

                if ($target.hasClass("dot") && !$target.is(startNode)) {
                    // Lưu lại source/target để cập nhật khi move device
                    $tempLine.data("source", startNode).data("target", $target);
                } else {
                    $tempLine.remove();
                }
                isWiring = false;
            });

            function getCenter($el) {
                const canvasOff = $("#canvas").offset();
                const elOff = $el.offset();
                return {
                    x: elOff.left - canvasOff.left + $el.outerWidth() / 2,
                    y: elOff.top - canvasOff.top + $el.outerHeight() / 2
                };
            }

            function updateAllLines() {
                $("path").each(function() {
                    const s = $(this).data("source");
                    const t = $(this).data("target");
                    if (s && t) {
                        const p1 = getCenter(s);
                        const p2 = getCenter(t);
                        $(this).attr("d", `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`);
                    }
                });
            }
        });
    </script>
</body>
</html>
